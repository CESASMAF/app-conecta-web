<!-- @dsCard group="Components" viewport="700x460" name="Patient status, risk & dialog" subtitle="M3StatusChip · M3RiskChip · LgpdAnonymizedBanner · M3Dialog" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..40,400,0,0" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-bg-primary); }
  .wrap { display: flex; flex-direction: column; gap: 20px; max-width: 640px; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--color-text-secondary); margin-bottom: 10px; }
  .rowflex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
  <div id="root" class="wrap"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { M3StatusChip, M3RiskChip, LgpdAnonymizedBanner, M3Dialog, M3Button, M3DropdownField, M3TextField } = window.RAROSWeb02DesignSystem_9e80fa;
    function Demo() {
      const [open, setOpen] = React.useState(false);
      return (
        <React.Fragment>
          <div>
            <div className="lbl">M3StatusChip — PatientStatus</div>
            <div className="rowflex">
              <M3StatusChip status="waitlisted" />
              <M3StatusChip status="active" />
              <M3StatusChip status="discharged" />
              <M3StatusChip status="withdrawn" />
            </div>
          </div>
          <div>
            <div className="lbl">M3RiskChip — computed analytics</div>
            <div className="rowflex">
              <M3RiskChip risk="violation" />
              <M3RiskChip risk="overcrowding" />
              <M3RiskChip risk="dropout" />
              <M3RiskChip risk="prenatal" />
            </div>
          </div>
          <div>
            <div className="lbl">LgpdAnonymizedBanner · M3Dialog</div>
            <LgpdAnonymizedBanner />
            <div style={{ marginTop: 12 }}>
              <M3Button variant="outlined" icon="logout" onPress={() => setOpen(true)}>Desligar do serviço</M3Button>
            </div>
          </div>
          <M3Dialog open={open} destructive icon="logout" title="Desligar do serviço"
            description="Registra a alta do paciente. Fica no histórico e pode ser revertida."
            onClose={() => setOpen(false)}
            actions={<>
              <M3Button variant="text" onPress={() => setOpen(false)}>Cancelar</M3Button>
              <M3Button variant="destructive" onPress={() => setOpen(false)}>Confirmar alta</M3Button>
            </>}>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <M3DropdownField label="Motivo" placeholder="Selecione" options={[{value:"a",label:"Objetivo alcançado"},{value:"other",label:"Outro"}]} />
              <M3TextField label="Observações" hint="Máx. 1000 caracteres" />
            </div>
          </M3Dialog>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
