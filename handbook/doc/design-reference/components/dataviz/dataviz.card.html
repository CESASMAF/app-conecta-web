<!-- @dsCard group="Components" viewport="700x720" name="Dataviz — pyramid, ranking, legend" subtitle="AgePyramidChart · TopNBarChart · M3SeriesLegendItem (every chart has a table alternative)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..40,400,0,0" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--color-bg-primary); }
  .wrap { display: flex; flex-direction: column; gap: 20px; max-width: 660px; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--color-text-secondary); margin-bottom: 10px; }
  .card { background: var(--color-bg-elevated); border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 18px; }
</style>
</head>
<body>
  <div id="root" class="wrap"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { AgePyramidChart, TopNBarChart, M3SectionHeader } = window.RAROSWeb02DesignSystem_9e80fa;
    const SEX = ["MALE","FEMALE"];
    const BANDS = ["0-4","5-9","10-14","15-19","20-24","25-29","30-34","35-39","40-44","45-49","50-54","55-59","60-64","65-69","70-74","75-79","80+"];
    const pyramid = [];
    BANDS.forEach((b, i) => {
      const base = Math.round(40 * Math.exp(-Math.pow((i-5)/4,2)) + 4);
      pyramid.push({ ageBand: b, sex: "MALE", value: base + (i%3) });
      pyramid.push({ ageBand: b, sex: "FEMALE", value: base + 4 + (i%4) });
    });
    pyramid.push({ ageBand: "30-34", sex: "UNKNOWN", value: 6 });
    const cid = [
      { code:"E75.2", label:"Gangliosidose GM2", value:37 },
      { code:"Q87.4", label:"Síndrome de Marfan", value:21 },
      { code:"E70.0", label:"Fenilcetonúria clássica", value:18 },
      { code:"G71.0", label:"Distrofia muscular", value:14 },
      { code:"D56.1", label:"Talassemia beta", value:9 },
    ];
    function Demo() {
      return (
        <React.Fragment>
          <div>
            <div className="lbl">AgePyramidChart</div>
            <div className="card">
              <M3SectionHeader title="Pirâmide etária" description="1.247 registros · jan–dez 2025" />
              <div style={{marginTop:"12px"}}>
                <AgePyramidChart items={pyramid} suppressedGroups={3} />
              </div>
            </div>
          </div>
          <div>
            <div className="lbl">TopNBarChart</div>
            <div className="card">
              <M3SectionHeader title="Top diagnósticos (CID-10)" />
              <div style={{marginTop:"12px"}}>
                <TopNBarChart items={cid} unitLabel="casos" caption="Top 5 diagnósticos CID-10" suppressedGroups={2} />
              </div>
            </div>
          </div>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
