<!-- @dsCard group="Social Care" viewport="1280x820" name="Social Care — prontuário (web_02)" subtitle="Patient list → prontuário (analytics, família, histórico) → discharge dialog" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>web_02 · Atendimento socioassistencial — RAROS Boa Vista</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..40,400,0,0" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--color-bg-primary); }
  .kit-shell { display: flex; height: 100vh; overflow: hidden; }
  .kit-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .kit-content { flex: 1; overflow: auto; }
  .kit-page { max-width: var(--layout-content-max); margin: 0 auto; padding: 24px 24px 64px; }

  .kit-pagehead { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 20px; }
  .kit-pagehead h1 { font-size: var(--text-3xl); }
  .kit-pagehead p { color: var(--color-text-secondary); margin-top: 4px; }

  .kit-listtools { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .kit-listtools__search { flex: 1; min-width: 240px; }

  .kit-table { width: 100%; border-collapse: collapse; background: var(--color-bg-elevated);
    border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); overflow: hidden; }
  .kit-table th { text-align: left; font-size: var(--text-xs); font-weight: var(--weight-semibold);
    color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: var(--tracking-caps);
    padding: 12px 16px; border-bottom: 1px solid var(--color-border-default); background: var(--color-bg-secondary); }
  .kit-row { cursor: pointer; transition: background var(--duration-fast); border-bottom: 1px solid var(--color-border-default); }
  .kit-row:last-child { border-bottom: none; }
  .kit-row:hover { background: var(--color-bg-secondary); }
  .kit-row:focus-visible { outline: var(--focus-ring-width) solid var(--color-focus-ring); outline-offset: -2px; }
  .kit-table td { padding: 12px 16px; vertical-align: middle; }
  .kit-cell-name { display: flex; align-items: center; gap: 12px; }
  .kit-cell-name b { font-weight: var(--weight-semibold); color: var(--color-text-primary); }
  .kit-cpf { font-family: var(--font-mono); color: var(--color-text-secondary); font-size: var(--text-sm); }
  .kit-risks { display: flex; gap: 6px; flex-wrap: wrap; }
  .kit-age { font-family: var(--font-mono); color: var(--color-text-secondary); text-align: right; }
  .kit-loadmore { display: flex; justify-content: center; margin-top: 18px; }

  .kit-recordhead { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; flex-wrap: wrap; }
  .kit-recordhead__id { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-text-secondary); }
  .kit-analytics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }

  .kit-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--color-border-default); margin-bottom: 20px; }
  .kit-tab { position: relative; border: none; background: none; font: inherit; cursor: pointer;
    padding: 12px 16px; color: var(--color-text-secondary); font-weight: var(--weight-medium);
    display: flex; align-items: center; gap: 7px; }
  .kit-tab .material-symbols-rounded { font-size: 19px; }
  .kit-tab[aria-selected="true"] { color: var(--color-action-primary); font-weight: var(--weight-semibold); }
  .kit-tab[aria-selected="true"]::after { content: ""; position: absolute; left: 12px; right: 12px; bottom: -1px;
    height: 3px; border-radius: 3px 3px 0 0; background: var(--color-action-primary); }
  .kit-tab:focus-visible { outline: var(--focus-ring-width) solid var(--color-focus-ring); outline-offset: -2px; border-radius: var(--radius-sm); }

  .kit-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .kit-card { background: var(--color-bg-elevated); border: 1px solid var(--color-border-default);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 20px; }
  .kit-card dl { margin: 16px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; }

  .kit-family { width: 100%; border-collapse: collapse; font-size: var(--text-sm); margin-top: 14px; }
  .kit-family th { text-align: left; font-size: var(--text-xs); color: var(--color-text-secondary);
    text-transform: uppercase; letter-spacing: var(--tracking-caps); padding: 8px 10px; border-bottom: 1px solid var(--color-border-default); }
  .kit-family td { padding: 10px; border-bottom: 1px solid var(--color-border-default); vertical-align: middle; }
  .kit-family tr:last-child td { border-bottom: none; }
  .kit-member { display: flex; align-items: center; gap: 10px; }
  .kit-member b { color: var(--color-text-primary); font-weight: var(--weight-medium); }
  .kit-pref { display: inline-flex; align-items: center; gap: 4px; color: var(--color-action-primary); font-size: var(--text-xs); font-weight: var(--weight-semibold); }
  .kit-pref .material-symbols-rounded { font-size: 16px; }
  .kit-pending { color: var(--color-warning); font-size: var(--text-xs); }

  .kit-form { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
  .kit-form__full { grid-column: 1 / -1; }
  .kit-formbar { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; }
  .kit-autosave { display: inline-flex; align-items: center; gap: 6px; font-size: var(--text-sm); color: var(--color-success); }
  .kit-autosave .material-symbols-rounded { font-size: 18px; }

  .kit-toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
    background: var(--warmgray-900); color: var(--white); padding: 12px 20px; border-radius: var(--radius-full);
    box-shadow: var(--shadow-lg); font-size: var(--text-sm); z-index: var(--z-modal); display: flex; gap: 10px; align-items: center; }
  .kit-toast .material-symbols-rounded { font-size: 20px; color: var(--success-100); }

  @media (max-width: 920px) { .kit-analytics, .kit-cols, .kit-form { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="fixtures.js"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById("root")).render(<window.ScApp.App />);
  </script>
</body>
</html>
