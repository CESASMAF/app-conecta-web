<!-- @dsCard group="Colors" viewport="700x180" name="Semantic surfaces" subtitle="the aliases UI actually references — bg / text / border / action" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--color-bg-primary); }
  .stack { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }
  .demo { background: var(--color-bg-elevated); border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); padding: var(--space-4); box-shadow: var(--shadow-sm); }
  .t1 { color: var(--color-text-primary); font-weight: var(--weight-semibold); font-size: var(--text-sm); }
  .t2 { color: var(--color-text-secondary); font-size: var(--text-xs); margin-top: 2px; }
  .btns { display: flex; gap: var(--space-2); margin-top: var(--space-3); }
  .b { font: inherit; font-size: var(--text-xs); font-weight: var(--weight-semibold); border: none; border-radius: var(--radius-full); padding: 7px 14px; cursor: pointer; }
  .filled { background: var(--color-action-primary); color: var(--color-action-primary-fg); }
  .tonal { background: var(--color-action-primary-tint); color: var(--color-action-primary-tint-fg); }
  .outlined { background: transparent; color: var(--color-text-primary); border: 1.5px solid var(--color-border-strong); }
  .tokens { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-secondary); line-height: 1.7; }
  .tokens b { color: var(--color-text-primary); font-weight: var(--weight-medium); }
  .swwrap { display:flex; gap:6px; margin-bottom: 8px;}
  .swwrap i { width: 22px; height: 22px; border-radius: 6px; border: 1px solid var(--color-border-default); }
</style>
</head>
<body>
  <div class="stack">
    <div class="demo">
      <div class="t1">Card on elevated surface</div>
      <div class="t2">Primary + secondary text · default border · soft shadow</div>
      <div class="btns">
        <button class="b filled">Filled</button>
        <button class="b tonal">Tonal</button>
        <button class="b outlined">Outlined</button>
      </div>
    </div>
    <div class="demo">
      <div class="swwrap">
        <i style="background:var(--color-bg-primary)"></i>
        <i style="background:var(--color-bg-secondary)"></i>
        <i style="background:var(--color-bg-elevated)"></i>
        <i style="background:var(--color-border-active);border-color:var(--color-border-active)"></i>
      </div>
      <div class="tokens">
        <b>--color-bg-primary / secondary / elevated</b><br/>
        <b>--color-text-primary / secondary / disabled</b><br/>
        <b>--color-border-default / strong / active</b><br/>
        <b>--color-action-primary / -hover / -active</b>
      </div>
    </div>
  </div>
</body>
</html>
