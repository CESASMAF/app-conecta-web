<!-- @dsCard group="Colors" viewport="700x170" name="Chart palette — Okabe–Ito" subtitle="categorical, colorblind-safe · consumed cat-1..8 in order, never skipped" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--color-bg-elevated); }
  .cats { display: flex; gap: var(--space-2); }
  .cat { flex: 1; text-align: center; }
  .cat .sw { height: 40px; border-radius: var(--radius-sm); }
  .cat span { display: block; font-family: var(--font-mono); font-size: 10px; color: var(--color-text-secondary); margin-top: 5px; }
  .sex { display: flex; gap: var(--space-4); margin-top: var(--space-4); font-size: var(--text-xs); color: var(--color-text-secondary); align-items: center; flex-wrap: wrap; }
  .pair { display: flex; align-items: center; gap: 6px; }
  .pair i { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  .seq { display: flex; gap: 0; margin-top: var(--space-3); border-radius: var(--radius-sm); overflow: hidden; width: 160px; }
  .seq div { flex: 1; height: 16px; }
</style>
</head>
<body>
  <div class="cats">
    <div class="cat"><div class="sw" style="background:var(--chart-cat-1)"></div><span>cat-1</span></div>
    <div class="cat"><div class="sw" style="background:var(--chart-cat-2)"></div><span>cat-2</span></div>
    <div class="cat"><div class="sw" style="background:var(--chart-cat-3)"></div><span>cat-3</span></div>
    <div class="cat"><div class="sw" style="background:var(--chart-cat-4)"></div><span>cat-4</span></div>
    <div class="cat"><div class="sw" style="background:var(--chart-cat-5)"></div><span>cat-5</span></div>
    <div class="cat"><div class="sw" style="background:var(--chart-cat-6)"></div><span>cat-6</span></div>
    <div class="cat"><div class="sw" style="background:var(--chart-cat-7)"></div><span>cat-7</span></div>
    <div class="cat"><div class="sw" style="background:var(--chart-cat-8)"></div><span>cat-8</span></div>
  </div>
  <div class="sex">
    <div class="pair"><i style="background:var(--chart-sex-male)"></i>sex-male</div>
    <div class="pair"><i style="background:var(--chart-sex-female)"></i>sex-female</div>
    <div class="pair"><i style="background:var(--chart-sex-unknown)"></i>sex-unknown</div>
    <span style="margin-left:auto">seq (intensity):</span>
    <div class="seq"><div style="background:var(--chart-seq-1)"></div><div style="background:var(--chart-seq-2)"></div><div style="background:var(--chart-seq-3)"></div><div style="background:var(--chart-seq-4)"></div><div style="background:var(--chart-seq-5)"></div></div>
  </div>
</body>
</html>
