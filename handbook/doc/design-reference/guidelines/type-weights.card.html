<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--color-bg-elevated); }
  .weights { display: flex; gap: var(--space-6); align-items: baseline; }
  .w { font-size: var(--text-xl); }
  .w small { display: block; font-size: 10px; font-family: var(--font-mono); color: var(--color-text-secondary); margin-top: 4px; font-weight: 400; }
  .r { font-weight: var(--weight-regular); }
  .m { font-weight: var(--weight-medium); }
  .s { font-weight: var(--weight-semibold); }
  .b { font-weight: var(--weight-bold); }
  .eyebrow { margin-top: var(--space-6); }
</style>
</head>
<body>
  <div class="weights">
    <div class="w r">Regular<small>400</small></div>
    <div class="w m">Medium<small>500</small></div>
    <div class="w s">SemiBold<small>600</small></div>
    <div class="w b">Bold<small>700</small></div>
  </div>
  <div class="eyebrow"><span class="eyebrow">Apresentação do projeto</span></div>
</body>
</html>
