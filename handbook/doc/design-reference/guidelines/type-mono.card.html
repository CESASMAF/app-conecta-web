<!-- @dsCard group="Type" viewport="700x180" name="Mono — values & codes" subtitle="Atkinson Hyperlegible Mono · KPI numerals, ICD-10, IBGE, tabular figures" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--color-bg-elevated); display: flex; gap: var(--space-8); align-items: center; }
  .kpi { }
  .kpi .v { font-family: var(--font-mono); font-size: var(--text-4xl); font-weight: var(--weight-bold); font-variant-numeric: tabular-nums; color: var(--color-text-primary); line-height: 1; }
  .kpi .l { font-size: var(--text-sm); color: var(--color-text-secondary); margin-top: 6px; }
  .codes { font-family: var(--font-mono); font-size: var(--text-base); color: var(--color-text-primary); line-height: 1.9; }
  .codes .muted { color: var(--color-text-secondary); }
  .sep { width: 1px; align-self: stretch; background: var(--color-border-default); }
</style>
</head>
<body>
  <div class="kpi">
    <div class="v">1.247</div>
    <div class="l">registros agregados</div>
  </div>
  <div class="kpi">
    <div class="v">R$&nbsp;1.412,00</div>
    <div class="l">benefícios · jan–dez 2025</div>
  </div>
  <div class="sep"></div>
  <div class="codes">
    E75.2 <span class="muted">Gangliosidose GM2</span><br/>
    Q87.4 <span class="muted">Síndrome de Marfan</span><br/>
    1401 <span class="muted">Norte de Roraima</span>
  </div>
</body>
</html>
