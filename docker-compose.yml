services:
  # ── Caddy (TLS reverse proxy) ──────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      bff:
        condition: service_healthy
    restart: unless-stopped

  # ── BFF (Deno + Hono) ─────────────────────────────────────────────────────
  bff:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - PORT=8081
      - HOST=0.0.0.0
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "deno", "eval", "const r = await fetch('http://localhost:8081/health'); if (!r.ok) Deno.exit(1);"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
