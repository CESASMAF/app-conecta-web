services:
  bff:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - PORT=8081
      - HOST=0.0.0.0
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "deno", "eval", "const r = await fetch('http://localhost:8081/health'); if (!r.ok) Deno.exit(1);"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
