<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Conecta — Cadastro Redesign Prototype</title>
<style>
@import url('https://api.fontshare.com/v2/css?f[]=erode@400,500,600,700&f[]=satoshi@400,500,600,700&display=swap');

/* ===================================================================
   DESIGN TOKENS — Sage Garden
   =================================================================== */
:root {
  --bg-base: #F8F3EC;
  --bg-warm: #F0E8DC;
  --bg-sage: #E2E8DF;
  --bg-sage-deep: #D4DDD0;
  --bg-card: rgba(255,255,255,0.45);
  --bg-card-hover: rgba(255,255,255,0.65);
  --bg-card-border: rgba(255,255,255,0.6);
  --bg-card-border-hover: rgba(79,132,72,0.2);

  --text-primary: #1E2B1A;
  --text-secondary: #3D5235;
  --text-muted: #6B7F65;
  --text-soft: #8B9E85;

  --green-primary: #4F8448;
  --green-dark: #3D6A37;
  --green-light: rgba(79,132,72,0.08);

  --danger: #C4422B;
  --danger-light: rgba(196,66,43,0.08);

  --sidebar-width: 64px;

  --font-display: 'Erode', Georgia, serif;
  --font-body: 'Satoshi', system-ui, -apple-system, sans-serif;

  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration-fast: 150ms;
  --duration-normal: 300ms;
  --duration-slow: 500ms;

  --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s5: 24px;
  --s6: 32px; --s7: 40px; --s8: 48px; --s9: 64px; --s10: 80px;

  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-pill: 100px;

  --line: rgba(79,132,72,0.08);
  --line-hover: rgba(79,132,72,0.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}
::selection { background: var(--green-primary); color: #fff; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(79,132,72,0.2); border-radius: 3px; }

/* ===================================================================
   FIXED BACKGROUND — gradient + blobs
   =================================================================== */
.bg-gradient {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(155deg, var(--bg-base) 0%, var(--bg-warm) 25%, var(--bg-sage) 55%, var(--bg-sage-deep) 100%);
}
.bg-blob-1 {
  position: fixed; top: -10%; right: 5%; width: 450px; height: 450px; border-radius: 50%;
  background: radial-gradient(circle, rgba(79,132,72,0.06) 0%, transparent 70%); z-index: 0;
}
.bg-blob-2 {
  position: fixed; bottom: -15%; left: 10%; width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(180,160,100,0.04) 0%, transparent 70%); z-index: 0;
}

/* ===================================================================
   LAYOUT
   =================================================================== */
.app { position: relative; z-index: 1; display: flex; min-height: 100vh; }

/* ===================================================================
   SIDEBAR — 64px icon bar, expands to 220px on hover
   =================================================================== */
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: var(--sidebar-width);
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid rgba(79,132,72,0.08);
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 0; z-index: 40;
  transition: width var(--duration-normal) var(--ease-out);
  overflow: hidden;
}
.sidebar:hover { width: 220px; }

.sidebar-logo {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-family: var(--font-display); font-size: 16px; font-weight: 700;
  margin-bottom: 8px; flex-shrink: 0;
}
.sidebar-brand {
  font-family: var(--font-display); font-size: 14px; color: var(--text-secondary); font-weight: 600;
  white-space: nowrap; opacity: 0; transform: translateX(-8px);
  transition: all var(--duration-normal) var(--ease-out); margin-bottom: 32px;
}
.sidebar:hover .sidebar-brand { opacity: 1; transform: translateX(0); }

.sidebar-nav { display: flex; flex-direction: column; gap: 4px; width: 100%; padding: 0 12px; }
.sidebar-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 12px;
  border-radius: var(--r-sm); cursor: pointer;
  transition: all var(--duration-fast) ease; text-decoration: none;
  color: var(--text-muted); white-space: nowrap;
}
.sidebar-item:hover { background: var(--green-light); color: var(--text-secondary); }
.sidebar-item.active { background: var(--green-light); color: var(--green-primary); }
.sidebar-icon {
  width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 16px;
}
.sidebar-label {
  font-size: 13px; font-weight: 500; opacity: 0; transform: translateX(-8px);
  transition: all var(--duration-normal) var(--ease-out);
}
.sidebar:hover .sidebar-label { opacity: 1; transform: translateX(0); }
.sidebar-badge {
  margin-left: auto; font-size: 11px; font-weight: 600;
  background: var(--green-light); color: var(--green-primary);
  padding: 2px 8px; border-radius: var(--r-pill);
  opacity: 0; transition: opacity var(--duration-normal) var(--ease-out);
}
.sidebar:hover .sidebar-badge { opacity: 1; }

.sidebar-footer { margin-top: auto; display: flex; align-items: center; gap: 10px; padding: 0 12px; width: 100%; }
.sidebar-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--bg-sage), var(--bg-sage-deep));
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: var(--green-dark); flex-shrink: 0;
}
.sidebar-username {
  font-size: 12px; color: var(--text-muted); white-space: nowrap;
  opacity: 0; transition: opacity var(--duration-normal) var(--ease-out);
}
.sidebar:hover .sidebar-username { opacity: 1; }

/* ===================================================================
   MAIN WIZARD AREA
   =================================================================== */
.main-content {
  margin-left: var(--sidebar-width);
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 32px;
  overflow-y: auto;
  min-height: 100vh;
}

.wizard-container {
  width: 100%;
  max-width: 720px;
}

/* ===================================================================
   TOP BAR — back link + step indicator
   =================================================================== */
.wizard-topbar {
  width: 100%;
  max-width: 720px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
}
.back-link {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--text-muted); text-decoration: none;
  transition: color var(--duration-fast) ease; cursor: pointer;
}
.back-link:hover { color: var(--text-secondary); }

/* ===================================================================
   STEPPER — progress bar + dots
   =================================================================== */
.stepper {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: var(--s7);
  width: 100%;
  max-width: 720px;
}

.progress-bar-bg {
  width: 100%;
  height: 3px;
  background: rgba(79,132,72,0.1);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--green-primary), var(--green-dark));
  border-radius: 2px;
  transition: width 0.6s var(--ease-out);
}

.progress-steps {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
}

.step-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  transition: all var(--duration-fast) ease;
}

.step-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(79,132,72,0.15);
  border: 2px solid transparent;
  transition: all var(--duration-normal) var(--ease-out);
}

.step-dot.completed {
  background: var(--green-primary);
  box-shadow: 0 0 0 3px rgba(79,132,72,0.1);
}

.step-dot.current {
  background: #fff;
  border-color: var(--green-primary);
  box-shadow: 0 0 0 3px rgba(79,132,72,0.12);
}

.step-label {
  font-size: 10px;
  color: var(--text-soft);
  white-space: nowrap;
  font-weight: 500;
  transition: color var(--duration-fast) ease;
}
.step-label.completed { color: var(--green-primary); }
.step-label.current { color: var(--text-secondary); font-weight: 600; }

.stepper-mobile {
  display: none;
  font-family: var(--font-body); font-size: 12px;
  color: var(--text-soft); text-align: center; font-weight: 500;
  padding: var(--s3) 0; margin-bottom: var(--s5);
}

/* ===================================================================
   GLASS WIZARD CARD
   =================================================================== */
.step-content {
  background: var(--bg-card);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--bg-card-border);
  border-radius: var(--r-xl);
  padding: 40px 44px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.03);
  animation: containerFadeIn 0.6s var(--ease-out);
}

@keyframes containerFadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===================================================================
   STEP HEADER
   =================================================================== */
.step-header {
  margin-bottom: var(--s6);
}
.step-number {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-soft);
  margin-bottom: var(--s2);
}
.step-title {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  margin-bottom: var(--s1);
}
.step-description {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.5;
}

/* ===================================================================
   FORM FIELDS — underline style
   =================================================================== */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px 28px;
}

.form-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.form-field.full { grid-column: 1 / -1; }

.field-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-soft);
}
.field-required::after {
  content: ' *';
  color: var(--danger);
}

.field-input {
  background: transparent;
  border: none;
  border-bottom: 1.5px solid rgba(79,132,72,0.15);
  padding: 10px 0;
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--text-primary);
  outline: none;
  transition: border-color var(--duration-normal) var(--ease-out);
  width: 100%;
}
.field-input::placeholder {
  color: var(--text-soft);
  font-style: italic;
}
.field-input:focus {
  border-color: var(--green-primary);
}
.field-input.error {
  border-color: var(--danger);
}
.field-input.filled {
  border-color: rgba(79,132,72,0.3);
}

.field-error {
  font-size: 12px;
  color: var(--danger);
  min-height: 16px;
}

.field-select {
  background: transparent;
  border: none;
  border-bottom: 1.5px solid rgba(79,132,72,0.15);
  padding: 10px 0;
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--text-primary);
  outline: none;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color var(--duration-normal) var(--ease-out);
  width: 100%;
}
.field-select:focus { border-color: var(--green-primary); }
.field-select option { background: #fff; color: var(--text-primary); }

.field-textarea {
  background: rgba(255,255,255,0.25);
  border: 1.5px solid rgba(79,132,72,0.12);
  border-radius: var(--r-md);
  padding: var(--s3);
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--text-primary);
  outline: none;
  resize: vertical;
  min-height: 100px;
  transition: border-color var(--duration-normal) var(--ease-out);
  width: 100%;
}
.field-textarea:focus { border-color: var(--green-primary); }
.field-textarea::placeholder { color: var(--text-soft); font-style: italic; }

.form-section-title {
  grid-column: 1 / -1;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-soft);
  padding-top: var(--s3);
  border-top: 1px solid rgba(79,132,72,0.08);
  margin-top: var(--s2);
}

/* ===================================================================
   CARD SELECTORS — glass-style pills (Sexo, Localizacao)
   =================================================================== */
.card-selector-group {
  display: flex;
  gap: 10px;
  margin-top: var(--s2);
}
.card-selector {
  flex: 1;
  padding: 14px 16px;
  background: rgba(255,255,255,0.4);
  border: 1.5px solid rgba(79,132,72,0.1);
  border-radius: var(--r-md);
  cursor: pointer;
  transition: all var(--duration-normal) var(--ease-out);
  text-align: center;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
}
.card-selector:hover {
  background: rgba(255,255,255,0.6);
  border-color: rgba(79,132,72,0.2);
}
.card-selector.selected {
  background: var(--green-light);
  border-color: var(--green-primary);
  color: var(--green-primary);
  font-weight: 600;
  box-shadow: 0 0 0 3px rgba(79,132,72,0.08);
}

/* ===================================================================
   PROGRAMS GRID — checkable items (Step 6)
   =================================================================== */
.programs-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--s3);
  margin-top: var(--s3);
}
.program-item {
  display: flex; align-items: center; gap: var(--s3);
  padding: var(--s3) var(--s4);
  border: 1.5px solid rgba(79,132,72,0.1);
  border-radius: var(--r-md);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
  background: rgba(255,255,255,0.3);
}
.program-item:hover { border-color: rgba(79,132,72,0.2); background: rgba(255,255,255,0.5); }
.program-item.selected {
  border-color: var(--green-primary);
  background: var(--green-light);
  box-shadow: 0 0 0 3px rgba(79,132,72,0.08);
}
.program-check {
  width: 18px; height: 18px; border-radius: var(--r-sm);
  border: 1.5px solid rgba(79,132,72,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0; color: transparent;
  transition: all var(--duration-fast) var(--ease-out);
}
.program-item.selected .program-check {
  background: var(--green-primary); border-color: var(--green-primary); color: #fff;
}
.program-label { font-size: 14px; color: var(--text-muted); }
.program-item.selected .program-label { color: var(--green-primary); font-weight: 500; }

/* ===================================================================
   DIAGNOSIS CARDS (Step 3)
   =================================================================== */
.diagnosis-card {
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: var(--r-lg);
  padding: var(--s5);
  position: relative;
  animation: fadeInUp var(--duration-slow) var(--ease-out) both;
}
.diagnosis-card + .diagnosis-card { margin-top: var(--s3); }
.diagnosis-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--s4) var(--s5);
}
.diagnosis-remove {
  position: absolute; top: var(--s3); right: var(--s3);
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid rgba(79,132,72,0.15); background: rgba(255,255,255,0.3);
  color: var(--text-muted); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--duration-fast) var(--ease-out);
}
.diagnosis-remove:hover {
  border-color: var(--danger); color: var(--danger);
  background: var(--danger-light);
}

.quick-cids {
  grid-column: 1 / -1;
  display: flex; gap: var(--s2); flex-wrap: wrap;
}
.cid-chip {
  font-family: var(--font-body);
  font-size: 12px; font-weight: 500;
  padding: 4px 12px;
  border-radius: var(--r-pill);
  border: 1px solid rgba(79,132,72,0.15);
  background: rgba(255,255,255,0.3);
  color: var(--text-muted);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
}
.cid-chip:hover {
  border-color: var(--green-primary); color: var(--green-primary);
  background: var(--green-light);
}

/* ===================================================================
   FAMILY MEMBER LIST (Step 4)
   =================================================================== */
.member-row {
  display: grid;
  grid-template-columns: auto 1fr 1fr auto;
  align-items: center;
  gap: var(--s4);
  padding: var(--s3) 0;
  border-bottom: 1px solid rgba(79,132,72,0.08);
  animation: fadeInUp var(--duration-slow) var(--ease-out) both;
}
.member-index {
  font-size: 12px; color: var(--text-soft);
  font-variant-numeric: tabular-nums; min-width: 20px;
}
.member-name { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--text-primary); }
.member-meta { font-size: 14px; color: var(--text-muted); }
.member-remove {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid rgba(79,132,72,0.15);
  background: transparent; color: var(--text-muted); font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all var(--duration-fast) var(--ease-out);
}
.member-remove:hover { border-color: var(--danger); color: var(--danger); }

.empty-members {
  text-align: center; padding: var(--s7) 0;
  color: var(--text-soft); font-size: 15px;
}

/* ===================================================================
   BUTTON BAR — pill buttons
   =================================================================== */
.button-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: var(--s7);
  padding-top: var(--s5);
  border-top: 1px solid rgba(79,132,72,0.08);
}

.btn {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  padding: 12px 28px;
  border-radius: var(--r-pill);
  cursor: pointer;
  transition: all var(--duration-normal) var(--ease-out);
  border: none;
}
.btn-secondary {
  background: transparent;
  border: 1.5px solid rgba(79,132,72,0.2);
  color: var(--text-muted);
  padding: 10px 20px;
}
.btn-secondary:hover { border-color: rgba(79,132,72,0.4); color: var(--text-secondary); }

.btn-primary {
  background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
  color: #fff;
  box-shadow: 0 2px 12px rgba(79,132,72,0.2);
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(79,132,72,0.3);
}

.btn-add {
  background: rgba(255,255,255,0.25);
  border: 1.5px dashed rgba(79,132,72,0.2);
  color: var(--text-muted);
  width: 100%;
  padding: var(--s3);
  border-radius: var(--r-md);
  font-family: var(--font-body);
  font-size: 14px;
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-out);
  margin-top: var(--s3);
}
.btn-add:hover {
  border-color: var(--green-primary); color: var(--green-primary);
  background: var(--green-light);
}

/* ===================================================================
   SUCCESS OVERLAY — glass container, spring animation
   =================================================================== */
.success-overlay {
  position: fixed; inset: 0;
  background: rgba(248,243,236,0.88);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1000;
  opacity: 0; pointer-events: none;
  transition: opacity var(--duration-slow) var(--ease-out);
}
.success-overlay.visible { opacity: 1; pointer-events: auto; }

.success-glass {
  background: var(--bg-card);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--bg-card-border);
  border-radius: var(--r-xl);
  padding: 48px 56px;
  text-align: center;
  max-width: 420px;
  width: 90%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.06);
}

.success-overlay.visible .success-glass {
  animation: successIn 0.8s var(--ease-spring) both;
}

@keyframes successScale {
  0% { transform: scale(0); }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes checkDraw {
  to { stroke-dashoffset: 0; }
}
@keyframes successIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

.success-circle {
  width: 64px; height: 64px; border-radius: 50%;
  background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  box-shadow: 0 4px 20px rgba(79,132,72,0.25);
  animation: successScale 600ms var(--ease-spring) both;
}
.success-circle svg {
  width: 28px; height: 28px;
  stroke: white; stroke-width: 2.5;
  fill: none; stroke-linecap: round; stroke-linejoin: round;
  stroke-dasharray: 30; stroke-dashoffset: 30;
  animation: checkDraw 500ms var(--ease-out) 400ms both;
}

.success-text {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
  animation: fadeInUp var(--duration-slow) var(--ease-out) 600ms both;
}
.success-sub {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.5;
  margin-bottom: 24px;
  animation: fadeInUp var(--duration-slow) var(--ease-out) 750ms both;
}
.success-actions {
  display: flex; gap: 12px; justify-content: center;
  animation: fadeInUp var(--duration-slow) var(--ease-out) 900ms both;
}

/* ===================================================================
   ANIMATIONS
   =================================================================== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===================================================================
   ERROR BANNER
   =================================================================== */
@keyframes bannerSlide {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}
.error-banner {
  display: flex; align-items: center; gap: var(--s3);
  padding: var(--s3) var(--s4);
  background: var(--danger-light);
  border: 1px solid rgba(196,66,43,0.15);
  border-radius: var(--r-md);
  margin-bottom: var(--s5);
  animation: bannerSlide var(--duration-slow) var(--ease-out);
}
.error-banner-icon {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--danger); color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.error-banner-text { font-size: 14px; color: var(--danger); }

/* ===================================================================
   CUSTOM CHECKBOX
   =================================================================== */
.checkbox-field {
  display: flex; align-items: center; gap: var(--s3);
  cursor: pointer; padding: 12px 0;
  font-family: var(--font-body); font-size: 14px; color: var(--text-muted);
}
.checkbox-field input[type="checkbox"] { display: none; }
.checkbox-box {
  width: 18px; height: 18px; border-radius: var(--r-sm);
  border: 1.5px solid rgba(79,132,72,0.2); background: rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  transition: all var(--duration-fast) var(--ease-out); flex-shrink: 0;
}
.checkbox-field input:checked + .checkbox-box {
  background: var(--green-primary); border-color: var(--green-primary);
}
.checkbox-field input:checked + .checkbox-box::after {
  content: '\2713'; color: white; font-size: 12px; font-weight: 700;
}

/* ===================================================================
   RADIO GROUP
   =================================================================== */
.radio-group-label {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-soft);
}
.radio-group { display: flex; gap: var(--s4); padding: 8px 0; }
.radio-option {
  display: flex; align-items: center; gap: var(--s2);
  font-family: var(--font-body); font-size: 15px; color: var(--text-primary); cursor: pointer;
}

/* ===================================================================
   SCENARIO PANEL — draggable
   =================================================================== */
.scenario-panel {
  position: fixed; top: var(--s3); right: var(--s3);
  background: rgba(255,255,255,0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(79,132,72,0.12); border-radius: var(--r-lg);
  padding: var(--s3); z-index: 1000; min-width: 180px;
  cursor: default; user-select: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.04);
}
.scenario-panel .drag-handle {
  display: flex; align-items: center; justify-content: space-between;
  cursor: grab; margin-bottom: var(--s2);
}
.scenario-panel .drag-handle:active { cursor: grabbing; }
.scenario-panel .drag-handle h3 { margin-bottom: 0; }
.scenario-panel .drag-dots { color: var(--text-soft); font-size: 14px; letter-spacing: 2px; line-height: 1; }
.scenario-panel h3 {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text-soft); margin-bottom: var(--s2);
}
.scenario-btn {
  display: block; width: 100%; padding: var(--s2) var(--s3);
  font-family: var(--font-body); font-size: 12px; color: var(--text-muted);
  background: none; border: none; border-radius: var(--r-sm);
  cursor: pointer; text-align: left;
  transition: all var(--duration-fast) var(--ease-out);
}
.scenario-btn:hover { background: var(--green-light); color: var(--text-secondary); }
.scenario-btn.active { background: var(--green-light); color: var(--green-primary); font-weight: 600; }

/* ===================================================================
   RESPONSIVE — Mobile
   =================================================================== */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main-content { margin-left: 0; padding: 24px 16px; }
  .step-content { padding: 28px 24px; }
  .form-grid { grid-template-columns: 1fr; }
  .programs-grid { grid-template-columns: 1fr; }
  .diagnosis-grid { grid-template-columns: 1fr; }
  .progress-steps { display: none; }
  .stepper-mobile { display: block; }
  .card-selector-group { flex-direction: column; }
  .member-row { grid-template-columns: auto 1fr auto; gap: var(--s2); }
  .member-meta { grid-column: 2; font-size: 12px; }
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg-gradient"></div>
<div class="bg-blob-1"></div>
<div class="bg-blob-2"></div>

<div class="app">
  <!-- SIDEBAR — 64px icon, expands on hover -->
  <nav class="sidebar">
    <div class="sidebar-logo">C</div>
    <div class="sidebar-brand">Conecta</div>
    <div class="sidebar-nav">
      <a class="sidebar-item" href="/prototype-home-redesign.html">
        <span class="sidebar-icon">&#9776;</span>
        <span class="sidebar-label">Familias</span>
        <span class="sidebar-badge">42</span>
      </a>
      <a class="sidebar-item active" href="/prototype-registration-redesign.html">
        <span class="sidebar-icon">&#43;</span>
        <span class="sidebar-label">Cadastro</span>
      </a>
      <a class="sidebar-item">
        <span class="sidebar-icon">&#9638;</span>
        <span class="sidebar-label">Relatorios</span>
      </a>
      <a class="sidebar-item">
        <span class="sidebar-icon">&#9881;</span>
        <span class="sidebar-label">Config</span>
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-avatar">DF</div>
      <div class="sidebar-username">Davi Franklin</div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main-content">
    <!-- Top bar -->
    <div class="wizard-topbar">
      <a href="/prototype-home-redesign.html" class="back-link">&#8592; Voltar para Familias</a>
      <span style="font-size:12px;color:var(--text-soft);font-weight:500;">Rascunho salvo automaticamente</span>
    </div>

    <div class="wizard-container">
      <!-- STEPPER -->
      <div class="stepper" id="stepper"></div>
      <div class="stepper-mobile" id="stepperMobile"></div>

      <!-- STEP CONTENT -->
      <div id="stepContent"></div>

      <!-- BUTTON BAR (inside glass card rendered by JS) is part of step content rendering -->
    </div>
  </main>
</div>

<!-- SUCCESS OVERLAY -->
<div class="success-overlay" id="successOverlay">
  <div class="success-glass">
    <div class="success-circle">
      <svg viewBox="0 0 24 24"><polyline points="6 12 10 16 18 8" /></svg>
    </div>
    <div class="success-text">Cadastro realizado!</div>
    <div class="success-sub">A familia foi cadastrada com sucesso no sistema Conecta.</div>
    <div class="success-actions">
      <button class="btn btn-secondary" onclick="goToStep(0)">Novo cadastro</button>
      <a href="/prototype-home-redesign.html" class="btn btn-primary" style="text-decoration:none;">Ver familias &#8594;</a>
    </div>
  </div>
</div>

<!-- SCENARIOS PANEL -->
<div class="scenario-panel" id="scenarioPanel">
  <div class="drag-handle" id="dragHandle">
    <h3>Etapa</h3>
    <span class="drag-dots">&#10303;</span>
  </div>
  <button class="scenario-btn active" onclick="goToStep(0)">0 -- Dados Pessoais</button>
  <button class="scenario-btn" onclick="goToStep(1)">1 -- Documentos</button>
  <button class="scenario-btn" onclick="goToStep(2)">2 -- Endereco</button>
  <button class="scenario-btn" onclick="goToStep(3)">3 -- Diagnosticos</button>
  <button class="scenario-btn" onclick="goToStep(4)">4 -- Familia</button>
  <button class="scenario-btn" onclick="goToStep(5)">5 -- Especificidades</button>
  <button class="scenario-btn" onclick="goToStep(6)">6 -- Ingresso</button>
  <button class="scenario-btn" onclick="showSuccess()">Sucesso</button>
</div>

<script>
const STEPS = [
  { number: "Etapa 01", title: "Dados Pessoais", desc: "Informacoes basicas da pessoa de referencia." },
  { number: "Etapa 02", title: "Documentos", desc: "CPF, NIS, CNS e documentos de identificacao. Informe ao menos um." },
  { number: "Etapa 03", title: "Endereco", desc: "Situacao de moradia e localizacao." },
  { number: "Etapa 04", title: "Diagnosticos", desc: "Pelo menos um diagnostico e obrigatorio." },
  { number: "Etapa 05", title: "Composicao Familiar", desc: "Membros da familia (opcional)." },
  { number: "Etapa 06", title: "Especificidades", desc: "Identidade social, etnica ou cultural (opcional)." },
  { number: "Etapa 07", title: "Ingresso", desc: "Tipo de ingresso e motivo do atendimento." },
];

const STEP_LABELS = ["Pessoais", "Docs", "Endereco", "Diag.", "Familia", "Espec.", "Ingresso"];

let currentStep = 0;

function field(label, name, placeholder, required = false, full = false) {
  return `<div class="form-field ${full ? 'full' : ''}">
    <label class="field-label ${required ? 'field-required' : ''}">${label}</label>
    <input class="field-input" type="text" placeholder="${placeholder}" />
  </div>`;
}

function select(label, name, options, required = false) {
  const opts = options.map(o => `<option value="${o}">${o}</option>`).join('');
  return `<div class="form-field">
    <label class="field-label ${required ? 'field-required' : ''}">${label}</label>
    <select class="field-select"><option value="">Selecione...</option>${opts}</select>
  </div>`;
}

function textarea(label, placeholder, full = true) {
  return `<div class="form-field ${full ? 'full' : ''}">
    <label class="field-label">${label}</label>
    <textarea class="field-textarea" placeholder="${placeholder}"></textarea>
  </div>`;
}

const stepForms = [
  // Step 0: Dados Pessoais
  () => `<div class="form-grid">
    ${field("Nome", "firstName", "Nome", true)}
    ${field("Sobrenome", "lastName", "Sobrenome", true)}
    ${field("Nome Social", "socialName", "Nome social (opcional)")}
    ${field("Nome da Mae", "motherName", "Nome completo da mae", true)}
    <div class="form-field">
      <label class="field-label field-required">Data de Nascimento</label>
      <input class="field-input" type="text" placeholder="DD/MM/AAAA" maxlength="10" oninput="maskDateInput(this)" />
    </div>
    ${select("Nacionalidade", "nationality", ["Brasileira", "Naturalizada", "Estrangeira"], true)}
    <div class="form-field">
      <label class="field-label field-required">Sexo</label>
      <div class="card-selector-group">
        <div class="card-selector" onclick="selectSingle(this)">Masculino</div>
        <div class="card-selector" onclick="selectSingle(this)">Feminino</div>
        <div class="card-selector" onclick="selectSingle(this)">Outro</div>
      </div>
    </div>
    <div class="form-field">
      <label class="field-label">Telefone</label>
      <input class="field-input" type="text" placeholder="(00) 00000-0000" oninput="maskPhone(this)" maxlength="15" />
    </div>
  </div>`,

  // Step 1: Documentos
  () => `<div class="form-grid">
    ${field("CPF", "cpf", "000.000.000-00")}
    ${field("NIS", "nis", "NIS")}
    ${field("CNS", "cns", "Cartao Nacional de Saude")}
    <div class="form-section-title">RG (preencha todos ou nenhum)</div>
    ${field("Numero do RG", "rgNumber", "Numero")}
    ${field("UF", "rgUf", "UF")}
    ${field("Orgao Emissor", "rgAgency", "SSP, DETRAN...")}
    ${field("Data de Emissao", "rgDate", "DD/MM/AAAA")}
  </div>`,

  // Step 2: Endereco
  () => `<div class="form-grid">
    ${select("Situacao de Moradia", "housing", ["Propria", "Alugada", "Cedida", "Situacao de rua", "Outros"], true)}
    <div class="form-field">
      <label class="field-label field-required">Localizacao</label>
      <div class="card-selector-group">
        <div class="card-selector" onclick="selectSingle(this)">Urbano</div>
        <div class="card-selector" onclick="selectSingle(this)">Rural</div>
      </div>
    </div>
    ${field("CEP", "cep", "00000-000")}
    ${field("Rua", "street", "Logradouro")}
    ${field("Numero", "number", "N")}
    ${field("Complemento", "complement", "Apto, bloco...")}
    ${field("Bairro", "neighborhood", "Bairro")}
    ${select("Estado", "state", ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"], true)}
    ${field("Cidade", "city", "Cidade", true)}
    <div class="form-field">
      <label class="checkbox-field">
        <input type="checkbox" name="isShelter" />
        <span class="checkbox-box"></span>
        Unidade de acolhimento / abrigo
      </label>
    </div>
    <div class="form-field">
      <label class="checkbox-field">
        <input type="checkbox" name="isHomeless" />
        <span class="checkbox-box"></span>
        Pessoa em situacao de rua
      </label>
    </div>
  </div>`,

  // Step 3: Diagnosticos
  () => `<div>
    <div id="diagList">
      <div class="diagnosis-card">
        <button class="diagnosis-remove" title="Remover">&times;</button>
        <div class="diagnosis-grid">
          <div class="form-field"><label class="field-label field-required">Codigo CID</label><input class="field-input" placeholder="Ex: G80" /></div>
          <div class="form-field"><label class="field-label field-required">Data</label><input class="field-input" placeholder="DD/MM/AAAA" /></div>
          <div class="form-field full"><label class="field-label field-required">Descricao</label><input class="field-input" placeholder="Descricao do diagnostico" /></div>
          <div class="quick-cids">
            <button class="cid-chip">G80 -- Paralisia cerebral</button>
            <button class="cid-chip">Q90 -- Sindrome de Down</button>
            <button class="cid-chip">F84.0 -- Autismo</button>
            <button class="cid-chip">E70 -- Fenilcetonuria</button>
            <button class="cid-chip">G71.0 -- Distrofia muscular</button>
          </div>
        </div>
      </div>
    </div>
    <button class="btn-add" onclick="addDiagnosis()">+ Adicionar diagnostico</button>
  </div>`,

  // Step 4: Familia
  () => `<div>
    <div id="memberList">
      <div class="member-row" style="animation-delay:0ms">
        <span class="member-index">01</span>
        <span class="member-name">Silva, Maria Aparecida</span>
        <span class="member-meta">Pessoa de referencia</span>
        <span style="min-width:28px"></span>
      </div>
    </div>
    <div id="familyForm" style="display:none"></div>
    <button class="btn-add" id="btnAddMember" onclick="showFamilyForm()">+ Adicionar membro</button>
  </div>`,

  // Step 5: Especificidades
  () => `<div class="form-grid">
    ${select("Identidade Social", "identity", [
      "Quilombola", "Indigena", "Ribeirinho", "Cigano",
      "Extrativista", "Pescador artesanal", "Pertencente a comunidade de terreiro",
      "Nenhuma das anteriores"
    ])}
    <div class="form-field"><label class="field-label">Descricao</label><input class="field-input" placeholder="Detalhes adicionais" /></div>
    ${textarea("Observacoes", "Informacoes complementares sobre especificidades...")}
  </div>`,

  // Step 6: Ingresso
  () => `<div class="form-grid">
    ${select("Tipo de Ingresso", "ingressType", ["Demanda espontanea", "Busca ativa", "Encaminhamento", "Reincidencia"], true)}
    ${field("Nome da Origem", "originName", "Instituicao de origem")}
    ${field("Contato da Origem", "originContact", "Telefone ou email")}
    ${textarea("Motivo do Atendimento", "Descreva o motivo do primeiro atendimento...", true)}
    <div class="form-section-title">Programas sociais vinculados</div>
    <div class="form-field full">
      <div class="programs-grid">
        <div class="program-item selected" onclick="this.classList.toggle('selected')">
          <div class="program-check">&#10003;</div>
          <span class="program-label">BPC (Beneficio de Prestacao Continuada)</span>
        </div>
        <div class="program-item" onclick="this.classList.toggle('selected')">
          <div class="program-check">&#10003;</div>
          <span class="program-label">Bolsa Familia</span>
        </div>
        <div class="program-item" onclick="this.classList.toggle('selected')">
          <div class="program-check">&#10003;</div>
          <span class="program-label">Auxilio Brasil</span>
        </div>
        <div class="program-item" onclick="this.classList.toggle('selected')">
          <div class="program-check">&#10003;</div>
          <span class="program-label">PETI</span>
        </div>
        <div class="program-item" onclick="this.classList.toggle('selected')">
          <div class="program-check">&#10003;</div>
          <span class="program-label">Outros programas</span>
        </div>
      </div>
    </div>
    ${textarea("Observacao", "Anotacoes gerais sobre o ingresso...")}
  </div>`,
];

function renderStepper() {
  const el = document.getElementById('stepper');
  // Progress bar
  const pct = ((currentStep) / (STEPS.length - 1)) * 100;
  let html = `
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>
    <div class="progress-steps">
  `;
  html += STEPS.map((s, i) => {
    const dotCls = i < currentStep ? 'completed' : i === currentStep ? 'current' : '';
    const lblCls = i < currentStep ? 'completed' : i === currentStep ? 'current' : '';
    return `<div class="step-item" onclick="goToStep(${i})">
      <div class="step-dot ${dotCls}"></div>
      <span class="step-label ${lblCls}">${STEP_LABELS[i]}</span>
    </div>`;
  }).join('');
  html += `</div>`;
  el.innerHTML = html;
}

function renderStep() {
  const step = STEPS[currentStep];
  const content = document.getElementById('stepContent');
  const isLastStep = currentStep === STEPS.length - 1;
  content.innerHTML = `
    <div class="step-content" key="${currentStep}">
      <div class="step-header">
        <div class="step-number">${step.number}</div>
        <h3 class="step-title">${step.title}</h3>
        <p class="step-description">${step.desc}</p>
      </div>
      ${stepForms[currentStep]()}
      <div class="button-bar">
        <button class="btn btn-secondary" id="btnBack" onclick="prevStep()" style="${currentStep === 0 ? 'visibility:hidden' : ''}">&#8592; Anterior</button>
        <button class="btn btn-primary" id="btnNext" onclick="nextStep()">${isLastStep ? 'Salvar Cadastro' : 'Proximo &#8594;'}</button>
      </div>
    </div>
  `;

  // Mobile stepper
  const mobileEl = document.getElementById('stepperMobile');
  mobileEl.textContent = `Etapa ${currentStep + 1} de ${STEPS.length} \u2014 ${STEP_LABELS[currentStep]}`;

  // Update scenario buttons
  document.querySelectorAll('.scenario-btn').forEach((b, i) => {
    b.classList.toggle('active', i === currentStep);
  });
}

function nextStep() {
  if (currentStep < STEPS.length - 1) {
    currentStep++;
    renderStepper();
    renderStep();
  } else {
    // Simulate saving state
    const btn = document.getElementById('btnNext');
    btn.textContent = 'Salvando...';
    btn.disabled = true;
    setTimeout(() => {
      btn.disabled = false;
      showSuccess();
    }, 1500);
  }
}

function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    renderStepper();
    renderStep();
  }
}

function goToStep(n) {
  currentStep = n;
  document.getElementById('successOverlay').classList.remove('visible');
  renderStepper();
  renderStep();
}

function showSuccess() {
  // Gather form data and save to localStorage
  const firstName = document.querySelector('[placeholder="Nome"]')?.value || 'Novo';
  const lastName = document.querySelector('[placeholder="Sobrenome"]')?.value || 'Paciente';
  const name = `${lastName}, ${firstName}`;
  const registration = {
    name,
    diagnosis: 'Aguardando diagnostico',
    members: 1,
    status: 'active',
  };
  try {
    const saved = JSON.parse(localStorage.getItem('conecta_registrations') || '[]');
    saved.push(registration);
    localStorage.setItem('conecta_registrations', JSON.stringify(saved));
  } catch (_) { /* ignore */ }

  document.getElementById('successOverlay').classList.add('visible');
  document.querySelectorAll('.scenario-btn').forEach((b, i) => {
    b.classList.toggle('active', i === 7);
  });
}

function addDiagnosis() {
  const list = document.getElementById('diagList');
  const card = document.createElement('div');
  card.className = 'diagnosis-card';
  card.innerHTML = `
    <button class="diagnosis-remove" onclick="this.parentElement.remove()">&times;</button>
    <div class="diagnosis-grid">
      <div class="form-field"><label class="field-label field-required">Codigo CID</label><input class="field-input" placeholder="Ex: Q90" /></div>
      <div class="form-field"><label class="field-label field-required">Data</label><input class="field-input" placeholder="DD/MM/AAAA" /></div>
      <div class="form-field full"><label class="field-label field-required">Descricao</label><input class="field-input" placeholder="Descricao do diagnostico" /></div>
    </div>
  `;
  list.appendChild(card);
}

// Masks (based on BFF feature specs)
function maskPhone(el) {
  let d = el.value.replace(/\D/g, '').slice(0, 11);
  if (d.length <= 2) { el.value = d.length ? `(${d}` : ''; return; }
  if (d.length <= 7) { el.value = `(${d.slice(0,2)}) ${d.slice(2)}`; return; }
  el.value = `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
}

// Family member form
let familyCount = 1; // 01 is the reference person

// Single-select toggle cards (reusable for Sexo, Localizacao, etc.)
function selectSingle(el) {
  el.closest('.card-selector-group').querySelectorAll('.card-selector').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
}

// dominio_parentesco lookup (UPPER_SNAKE_CASE codes from backend)
const PARENTESCO_LOOKUP = [
  { codigo: "PESSOA_REFERENCIA", descricao: "Pessoa de Referencia" },
  { codigo: "CONJUGE", descricao: "Conjuge / Companheiro(a)" },
  { codigo: "FILHO", descricao: "Filho(a)" },
  { codigo: "ENTEADO", descricao: "Enteado(a)" },
  { codigo: "PAI", descricao: "Pai" },
  { codigo: "MAE", descricao: "Mae" },
  { codigo: "AVO", descricao: "Avo / Avo" },
  { codigo: "NETO", descricao: "Neto(a)" },
  { codigo: "IRMAO", descricao: "Irmao / Irma" },
  { codigo: "TIO", descricao: "Tio(a)" },
  { codigo: "SOBRINHO", descricao: "Sobrinho(a)" },
  { codigo: "PRIMO", descricao: "Primo(a)" },
  { codigo: "OUTRO_PARENTE", descricao: "Outro Parente" },
  { codigo: "NAO_PARENTE", descricao: "Nao Parente" },
];

function maskDateInput(el) {
  let d = el.value.replace(/\D/g, '').slice(0, 8);
  if (d.length <= 2) { el.value = d; return; }
  if (d.length <= 4) { el.value = d.slice(0,2) + '/' + d.slice(2); return; }
  el.value = d.slice(0,2) + '/' + d.slice(2,4) + '/' + d.slice(4);
}

function showFamilyForm() {
  const form = document.getElementById('familyForm');
  document.getElementById('btnAddMember').style.display = 'none';
  form.style.display = 'block';
  const parentescoOpts = PARENTESCO_LOOKUP
    .filter(p => p.codigo !== 'PESSOA_REFERENCIA')
    .map(p => `<option value="${p.codigo}">${p.codigo} \u2014 ${p.descricao}</option>`)
    .join('');
  form.innerHTML = `
    <div style="border:1.5px solid var(--green-primary);border-radius:var(--r-lg);padding:var(--s5);margin-top:var(--s3);background:rgba(255,255,255,0.3);backdrop-filter:blur(12px);animation:fadeInUp var(--duration-slow) var(--ease-out) both;">
      <div class="form-grid">
        ${field("Nome", "fm_name", "Nome completo", true)}
        <div class="form-field">
          <label class="field-label">Data de nascimento</label>
          <input class="field-input" id="fm_birth" type="text" placeholder="DD/MM/AAAA" maxlength="10" oninput="maskDateInput(this)" />
        </div>
        ${select("Sexo", "fm_sex", ["Masculino", "Feminino", "Outro"])}
        <div class="form-field">
          <label class="field-label field-required">Parentesco</label>
          <select class="field-select" id="fm_rel"><option value="">Selecione...</option>${parentescoOpts}</select>
        </div>
        <div class="form-field">
          <label class="checkbox-field">
            <input type="checkbox" id="fm_lives" checked />
            <span class="checkbox-box"></span>
            Reside com o paciente
          </label>
        </div>
        <div class="form-field">
          <label class="checkbox-field">
            <input type="checkbox" id="fm_disabled" />
            <span class="checkbox-box"></span>
            Pessoa com deficiencia
          </label>
        </div>
      </div>
      <div style="display:flex;gap:var(--s3);justify-content:flex-end;margin-top:var(--s4);">
        <button class="btn btn-secondary" onclick="cancelFamilyForm()">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmFamilyMember()">Confirmar</button>
      </div>
    </div>
  `;
}

function cancelFamilyForm() {
  document.getElementById('familyForm').style.display = 'none';
  document.getElementById('btnAddMember').style.display = '';
}

function confirmFamilyMember() {
  const name = document.querySelector('[placeholder="Nome completo"]')?.value || 'Novo membro';
  const relSelect = document.getElementById('fm_rel');
  const relCode = relSelect?.value || '';
  const relLabel = relSelect?.options[relSelect.selectedIndex]?.text || 'Familiar';
  const sex = document.querySelector('[name="fm_sex"]')?.value || '';
  const lives = document.getElementById('fm_lives')?.checked;
  const birth = document.getElementById('fm_birth')?.value || '';

  if (!name.trim() || !relCode) {
    if (!relCode) relSelect.style.borderColor = 'var(--danger)';
    return;
  }

  familyCount++;
  const idx = String(familyCount).padStart(2, '0');
  const meta = `${relLabel} | ${sex} | ${birth ? birth : ''} | ${lives ? 'Reside' : 'Nao reside'}`;

  const row = document.createElement('div');
  row.className = 'member-row';
  row.style.animationDelay = '0ms';
  row.innerHTML = `
    <span class="member-index">${idx}</span>
    <span class="member-name">${name}</span>
    <span class="member-meta">${meta}</span>
    <button class="member-remove" onclick="this.parentElement.remove()">&times;</button>
  `;
  document.getElementById('memberList').appendChild(row);
  cancelFamilyForm();
}

// Draggable scenario panel
(function() {
  const panel = document.getElementById('scenarioPanel');
  const handle = document.getElementById('dragHandle');
  let isDragging = false, offsetX = 0, offsetY = 0;

  handle.addEventListener('mousedown', (e) => {
    isDragging = true;
    const rect = panel.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    panel.style.transition = 'none';
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    panel.style.left = (e.clientX - offsetX) + 'px';
    panel.style.top = (e.clientY - offsetY) + 'px';
    panel.style.right = 'auto';
  });

  document.addEventListener('mouseup', () => {
    isDragging = false;
    panel.style.transition = '';
  });
})();

// Init
renderStepper();
renderStep();
</script>
</body>
