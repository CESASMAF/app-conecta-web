name: Build and Publish Web App (Bun) Image

# Publica a imagem do web_02 (front + BFF) em ghcr.io/<owner>/app-conecta-web.
# Standalone (não depende do reusable cross-org acdgbrasil/.github): o web-app é
# EXCLUSIVO do CESASMAF. O nome da imagem é forçado a lowercase pelo metadata-action.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - v*.*.*

permissions:
  contents: read
  packages: write

jobs:
  container-image:
    name: Build Bun image and publish when applicable
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/app-conecta-web
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-summary:
    name: Publish summary
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - container-image
    permissions:
      contents: read
    steps:
      - name: Show immutable image reference for production
        run: |
          echo "Image(s): ${{ needs.container-image.outputs.image }}"
          echo "Digest:   ${{ needs.container-image.outputs.digest }}"
          echo "Use the digest-pinned reference in production (compose.prod.yml / production.lock.yaml)."
